name: Full CI - Frontend, Backend, SonarCloud & Docker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build and Test Backend
        working-directory: back
        run: mvn clean verify
      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: back/target/site/jacoco
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Backend Docker Image
        working-directory: back
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bobapp-back:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/bobapp-back:latest

  frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Frontend Dependencies
        working-directory: front
        run: npm install
      - name: Run Frontend Tests
        working-directory: front
        run: npm run test -- --code-coverage --browsers=ChromeHeadless --watch=false
      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Frontend Docker Image
        working-directory: front
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bobapp-front:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/bobapp-front:latest

  sonarcloud:
    name: SonarCloud Global Analysis
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Frontend Coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage
      - name: Download Backend Coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: back/target/site/jacoco
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.projectKey=christopheocr_Gerez-un-projet-collaboratif-en-int-grant-une-demarche-CI-CD
            -Dsonar.organization=christopheocr
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

